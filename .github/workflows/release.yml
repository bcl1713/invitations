name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Resolve Docker tags
        id: docker-tags
        run: |
          set -euo pipefail
          TAGS="ghcr.io/${GITHUB_REPOSITORY}:latest
          ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA}"

          RELEASE_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$' | head -n 1 || true)
          if [ -n "$RELEASE_TAG" ]; then
            VERSION_TAG=${RELEASE_TAG#v}
            TAGS="$TAGS
          ghcr.io/${GITHUB_REPOSITORY}:${RELEASE_TAG}
          ghcr.io/${GITHUB_REPOSITORY}:${VERSION_TAG}"
          fi

          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
