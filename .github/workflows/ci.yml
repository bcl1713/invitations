name: ci

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://invitations:invitations@localhost:5432/invitations_test?schema=public
      LOGIN_THROTTLE_TEST_DATABASE_URL: postgresql://invitations:invitations@localhost:5432/invitations_test?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: invitations_test
          POSTGRES_USER: invitations
          POSTGRES_PASSWORD: invitations
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invitations -d invitations_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:migrate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
